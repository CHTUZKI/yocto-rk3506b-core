#@TYPE: Machine
#@NAME: HD-RK3506B-CORE
#@DESCRIPTION: Vanxak HD-RK3506B-CORE module (512MB DDR3L + 8GB eMMC)

require conf/machine/include/rk3506b-common.inc

MACHINE_FEATURES += "alsa usbhost usbgadget"

# HD-RK3506B-512F8GLW: 512MB DDR3L, 8GB eMMC
# Pin mux follows HD-RK3506-IOT evaluation board per vendor manual.
KERNEL_DEVICETREE = "rockchip/rk3506g-evb1-v10.dtb"
UBOOT_MACHINE = "rk3506_defconfig"

# Root filesystem on eMMC GPT partition (must match wic part-name rootfs)
RK_UPDATEIMG_ROOTDEV = "PARTLABEL=rootfs"

IMAGE_ROOTFS_SIZE ?= "2097152"
IMAGE_ROOTFS_EXTRA_SPACE ?= "65536"
